name: Publish advice registry

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout registry repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Ensure publish_state.json exists
        run: |
          if [ ! -f publish_state.json ]; then
            echo '{"generated": "", "sets": {}}' > publish_state.json
          fi
