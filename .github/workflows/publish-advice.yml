name: Publish code to ices-advice

on:
  workflow_dispatch:
  push:
    paths:
      - repos.json

jobs:
  publish:
    uses: ices-tools-prod/workflows/.github/workflows/publish-advice-code.yml@main
    with:
      source_org: "ices-taf"
      target_org: "ices-advice"
    secrets:
      CROSS_ORG_TOKEN: ${{ secrets.CROSS_ORG_TOKEN }}
      TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
