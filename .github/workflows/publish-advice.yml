name: Publish repositories to registry

on:
  workflow_dispatch:
  push:
    paths:
      - repos.json
      - published_commits.json
      - .github/workflows/publish-advice.yml

jobs:
  publish-registry:
    runs-on: ubuntu-latest

    env:
      GH_TOKEN: ${{ secrets.CROSS_ORG_TOKEN }}

    steps:
      - name: Checkout workflow repository
        uses: actions/checkout@v4

      - name: Configure git
        run: |
          git config --global user.name "ices-github-bot"
          git config --global user.email "github@ices.dk"

      - name: Install jq and gh
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          gh --version

      - name: Publish sets to registry (only if changed)
        shell: bash
        run: |
          set -euo pipefail

          MANIFEST_FILE="$GITHUB_WORKSPACE/published_commits.json"

          PUBLISHED_SETS_FILE="$GITHUB_WORKSPACE/.published_sets.txt"
          : > "$PUBLISHED_SETS_FILE"

          # Initialise manifest if missing
          if [ ! -f "$MANIFEST_FILE" ]; then
            jq -n \
              --arg date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              '{ generated_at_utc: $date, sets: {} }' \
              > "$MANIFEST_FILE"
          fi

          # TEST MODE: first set only
          jq -c '.sets[0:1][]' repos.json | while read -r set; do
            ORG_TARGET=$(jq -r '.org_target' <<<"$set")
            TARGET_REPO=$(jq -r '.repo_name' <<<"$set")
            SRC_ORG=$(jq -r '.org_source' <<<"$set")
            SET_KEY="$ORG_TARGET/$TARGET_REPO"

            echo "::group::Evaluating set $SET_KEY"

            WORKDIR=$(mktemp -d)
            cd "$WORKDIR"

            # Track current repo SHAs
            echo '{}' > .current_sources.json
            CHANGED=false

            # Check whether set already exists in manifest
            if ! jq -e --arg set "$SET_KEY" '.sets[$set]' "$MANIFEST_FILE" >/dev/null 2>&1; then
              echo "No manifest entry for $SET_KEY - forcing republish"
              CHANGED=true
            fi

            # First pass: compare SHAs
            jq -c '.repos[]' <<<"$set" | while read -r repo; do
              SRC_REPO=$(jq -r '.name' <<<"$repo")

              git clone --depth 1 \
                "https://x-access-token:$GH_TOKEN@github.com/$SRC_ORG/$SRC_REPO.git" \
                "$SRC_REPO"

              COMMIT_SHA=$(cd "$SRC_REPO" && git rev-parse HEAD)

              PREV_SHA=$(jq -r \
                --arg set "$SET_KEY" \
                --arg repo "$SRC_ORG/$SRC_REPO" \
                '.sets[$set].sources[$repo] // empty' \
                "$MANIFEST_FILE")

              echo "Repo $SRC_ORG/$SRC_REPO - current SHA: $COMMIT_SHA, previous SHA: $PREV_SHA"

              if [ "$COMMIT_SHA" != "$PREV_SHA" ]; then
                CHANGED=true
              fi

              jq \
                --arg key "$SRC_ORG/$SRC_REPO" \
                --arg val "$COMMIT_SHA" \
                '. + { ($key): $val }' \
                .current_sources.json > .tmp.json && mv .tmp.json .current_sources.json

              rm -rf "$SRC_REPO"
            done

            if [ "$CHANGED" != "true" ]; then
              echo "No changes detected for $SET_KEY - skipping publish"
              echo "::endgroup::"
              continue
            fi

            echo "Changes detected - publishing $SET_KEY"

            # --- rebuild registry repo ---
            mkdir registry
            cd registry
            git init
            git checkout -B main

            # --- pull in source repositories as folders ---
            jq -c '.repos[]' <<<"$set" | while read -r repo; do
              SRC_REPO=$(jq -r '.name' <<<"$repo")
              SAFE=$(jq -r '.safe // false' <<<"$repo")

              echo "Adding $SRC_ORG/$SRC_REPO"

              git clone --depth 1 \
                "https://x-access-token:$GH_TOKEN@github.com/$SRC_ORG/$SRC_REPO.git" \
                "$SRC_REPO"

              rm -rf "$SRC_REPO/.git"

              echo "Cleaning $SRC_REPO"
              (
                cd "$SRC_REPO"

                # clear out data
                dirs_to_clean=("data" "model" "report" "output")

                if [ "$SAFE" = "true" ]; then
                  dirs_to_clean+=(
                    "bootstrap/initial"
                    "bootstrap/data"
                    "bootstrap/software"
                    "boot/initial"
                    "boot/data"
                    "boot/software"
                  )
                fi

                for dir in "${dirs_to_clean[@]}"; do
                  rm -rf "$dir"
                done

                # if they havnt been remove, keep these directories
                keep_dirs=("boot" "bootstrap" "data" "model" "report" "output")
                keep_files=("LICENSE" "LICENCE")

                shopt -s nullglob

                for item in *; do
                  # skip directories we keep
                  if [ -d "$item" ] && [[ " ${keep_dirs[*]} " == *" $item "* ]]; then
                    continue
                  fi

                  # skip LICENSE / LICENCE
                  if [[ " ${keep_files[*]} " == *" $item "* ]]; then
                    continue
                  fi

                  # keep recognised source files
                  if [[ "$item" =~ \.(r|R|md|Rmd|Rnw|tex)$ ]]; then
                    continue
                  fi

                  # remove everything else
                  rm -rf "$item"
                done
              )
            done

            # --- single snapshot commit ---
            git add .
            git commit -m "Advice ($(date -u +%Y))"

            # --- ensure target repo exists ---
            if ! gh repo view "$ORG_TARGET/$TARGET_REPO" >/dev/null 2>&1; then
              gh repo create "$ORG_TARGET/$TARGET_REPO" --private --confirm
            fi

            # --- force push single commit ---
            git remote add origin \
              "https://x-access-token:$GH_TOKEN@github.com/$ORG_TARGET/$TARGET_REPO.git"

            git push --force origin main

            echo "$SET_KEY" >> "$PUBLISHED_SETS_FILE"

            # --- update manifest ---
            jq \
              --arg set "$SET_KEY" \
              --arg date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              --slurpfile src .current_sources.json \
              '
              .generated_at_utc = $date
              | .sets[$set] = {
                  published_at_utc: $date,
                  sources: $src[0]
                }
              ' "$MANIFEST_FILE" > "$MANIFEST_FILE.next"

            mv "$MANIFEST_FILE.next" "$MANIFEST_FILE"

            echo "::endgroup::"
          done

      - name: Commit updated published_commits.json
        shell: bash
        run: |
          git add published_commits.json
          if ! git diff --cached --quiet; then
            git commit -m "Update published commit manifest"
            git push
          else
            echo "No manifest changes to commit"
          fi

      - name: Notify Teams of published registries
        if: always()
        shell: bash
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          set -euo pipefail

          PUBLISHED_SETS_FILE=".published_sets.txt"

          if [ ! -f "$PUBLISHED_SETS_FILE" ] || [ ! -s "$PUBLISHED_SETS_FILE" ]; then
            echo "No registries published - skipping Teams notification"
            exit 0
          fi

          LIST=$(sort -u "$PUBLISHED_SETS_FILE" | awk '{print "- https://github.com/" $0}')

          MESSAGE=$(printf "**✅ Advice code published or updated**\n\n%s\n\n_Checked at %s (UTC)_" \
            "$LIST" \
            "$(date -u +%Y-%m-%dT%H:%M:%SZ)")

          payload=$(jq -n \
            --arg msg "$MESSAGE" \
            '{
              "@type": "MessageCard",
              "@context": "https://schema.org/extensions",
              "summary": "Advice code update",
              "themeColor": "2EB886",
              "title": "📢 Advice code update",
              "text": $msg
            }')

          curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "$payload" \
            "$TEAMS_WEBHOOK_URL"
