name: Publish advice repositories after release date

on:
  workflow_dispatch:
  schedule:
    # Runs daily at 10:00 UTC (12:00 CEST) - adjust as needed
    - cron: '00 10 * * *'
  push:
    paths:
      - repos.json

jobs:
  publish-after-date:
    uses: ices-tools-prod/workflows/.github/workflows/sync-repo-visibility.yml@main
    with:
      target_org: "ices-advice"
    secrets:
      CROSS_ORG_TOKEN: ${{ secrets.CROSS_ORG_TOKEN }}
      TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
