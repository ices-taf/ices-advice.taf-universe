name: Publish advice on release date

on:
  workflow_dispatch:
  schedule:
    # Runs daily at 11:59 UTC
    - cron: '59 11 * * *'
  push:
    paths:
      - repos.json
      - publish-after-date.yml

jobs:
  publish-visibility:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout registry repository
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Check and publish repositories
        env:
          GH_TOKEN: ${{ secrets.CROSS_ORG_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          TODAY=$(date -u +%Y-%m-%d)

          echo "Today (UTC): $TODAY"

          jq -c '.sets[] | select(.publish_after != null and .publish_after != "")' repos.json \
          | while read -r set; do

            REPO_NAME=$(jq -r '.repo_name' <<<"$set")
            ORG=$(jq -r '.org_target' <<<"$set")
            PUBLISH_AFTER=$(jq -r '.publish_after' <<<"$set")

            echo "::group::Checking $ORG/$REPO_NAME"

            if [[ "$TODAY" < "$PUBLISH_AFTER" ]]; then
              echo "Not yet public: $TODAY < $PUBLISH_AFTER"
              echo "::endgroup::"
              continue
            fi

            VISIBILITY=$(curl -s \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/$ORG/$REPO_NAME \
              | jq -r '.private')

            if [[ "$VISIBILITY" == "false" ]]; then
              echo "Repository already public"
              echo "$ORG/$REPO_NAME" >> already_public_repos.txt
              echo "::endgroup::"
              continue
            fi

            echo "Making repository public..."

            curl -s -X PATCH \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/$ORG/$REPO_NAME \
              -d '{"private": false}'

            echo "$ORG/$REPO_NAME" >> published_repos.txt
            echo "✅ $ORG/$REPO_NAME is now public"
            echo "::endgroup::"
          done

      - name: Notify Teams (publish summary)
        if: always()
        env:
          WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        shell: bash
        run: |
          NEW_SECTION=""
          OLD_SECTION=""

          if [ -f published_repos.txt ]; then
            NEW_LIST=$(sort -u published_repos.txt | awk '{print "- https://github.com/" $0}')
            if [ -n "$NEW_LIST" ]; then
              NEW_SECTION="**✅ Newly published repositories:**\n\n$NEW_LIST\n"
            fi
          fi

          if [ -f already_public_repos.txt ]; then
            OLD_LIST=$(sort -u already_public_repos.txt | awk '{print "- https://github.com/" $0}')
            if [ -n "$OLD_LIST" ]; then
              OLD_SECTION="**ℹ️ Repositories already public:**\n\n$OLD_LIST\n"
            fi
          fi

          if [ -z "$NEW_SECTION" ] && [ -z "$OLD_SECTION" ]; then
            echo "No repositories to report"
            exit 0
          fi

          MESSAGE="${NEW_SECTION}\n${OLD_SECTION}"

          payload=$(jq -n \
            --arg date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg msg "$MESSAGE" \
            '{
              "@type": "MessageCard",
              "@context": "https://schema.org/extensions",
              "summary": "Advice repository publish summary",
              "themeColor": "2EB886",
              "title": "📢 Advice repository publish summary",
              "text": $msg,
              "sections": [
                {
                  "facts": [
                    { "name": "Checked at (UTC)", "value": $date }
                  ]
                }
              ]
            }')

          curl -X POST \
            -H "Content-Type: application/json" \
            -d "$payload" \
            "$WEBHOOK_URL"
