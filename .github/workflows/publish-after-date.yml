name: Make repos public on release date

on:
  workflow_dispatch:
  schedule:
    # Runs daily at 11:59 UTC
    - cron: '59 11 * * *'
  push:
    paths:
      - repos.json
      - .github/workflows/publish-after-date.yml

jobs:
  publish-visibility:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout registry repository
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Check and publish repositories
        env:
          GH_TOKEN: ${{ secrets.CROSS_ORG_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          jq -c '.sets[] | select(.publish_after_utc != null and .publish_after_utc != "")' repos.json \
          | while read -r set; do

            REPO_NAME=$(jq -r '.repo_name' <<<"$set")
            ORG=$(jq -r '.org_target' <<<"$set")
            PUBLISH_AFTER_RAW=$(jq -r '.publish_after_utc' <<<"$set")

            PUBLISH_AFTER_EPOCH=$(date -ud "$PUBLISH_AFTER_RAW" +%s)
            TODAY_EPOCH=$(date -u +%s)

            echo "::group::Checking $ORG/$REPO_NAME"

            HTTP_STATUS=$(curl -s -o response.json -w "%{http_code}" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/$ORG/$REPO_NAME)

            if [ "$HTTP_STATUS" == "401" ]; then
              echo "GitHub API returned 401 - PAT may have expired"
              echo "expired" > pat_status.txt
              continue
            fi

            PRIVATE=$(jq -r '.private' response.json)

            echo "DEBUG date comparison:"
            echo "  TODAY_EPOCH=$TODAY_EPOCH ($(date -ud "@$TODAY_EPOCH"))"
            echo "  PUBLISH_AFTER_EPOCH=$PUBLISH_AFTER_EPOCH ($(date -ud "@$PUBLISH_AFTER_EPOCH"))"

            if [ "$TODAY_EPOCH" -ge "$PUBLISH_AFTER_EPOCH" ]; then
              echo "DEBUG: TODAY >= PUBLISH_AFTER"
            else
              echo "DEBUG: TODAY < PUBLISH_AFTER"
            fi


            # --- CASE 1: repo should be private but is public ---
            if [[ "$TODAY_EPOCH" -lt "$PUBLISH_AFTER_EPOCH" && "$PRIVATE" == "false" ]]; then
              echo "Repository is public too early - reverting to private"

              curl -s -X PATCH \
                -H "Authorization: Bearer $GH_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                https://api.github.com/repos/$ORG/$REPO_NAME \
                -d '{"private": true}'

              echo "$ORG/$REPO_NAME" >> reverted_to_private.txt
              continue
            fi

            # --- CASE 2: repo should be public and is private ---
            if [[ "$PRIVATE" == "true" ]]; then
              echo "Repository is private - checking if it should be public"
              if [[ "$TODAY_EPOCH" -ge "$PUBLISH_AFTER_EPOCH" ]]; then
                echo "Making repository public"

                curl -s -X PATCH \
                  -H "Authorization: Bearer $GH_TOKEN" \
                  -H "Accept: application/vnd.github+json" \
                  https://api.github.com/repos/$ORG/$REPO_NAME \
                  -d '{"private": false}'

                echo "$ORG/$REPO_NAME" >> published_repos.txt
                continue
              fi
            fi

            # --- CASE 3: already in correct state ---
            if [[ "$PRIVATE" == "false" && "$TODAY_EPOCH" -eq "$PUBLISH_AFTER_EPOCH" ]]; then
              echo "Repository is already public"
              echo "$ORG/$REPO_NAME" >> already_public_repos.txt
            fi

            echo "::endgroup::"
          done

      - name: Notify Teams (publish summary)
        if: always()
        env:
          WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        shell: bash
        run: |
          # Do not report if everything was already public and nothing else happened
          if [ ! -f published_repos.txt ] && \
            [ ! -f reverted_to_private.txt ] && \
            [ ! -f pat_status.txt ]; then
            echo "All repositories already public – no notification sent"
            exit 0
          fi

          WARNING_SECTION=""
          PUBLIC_SECTION=""
          ALREADY_PUBLIC_SECTION=""
          REVERTED_SECTION=""

          if [ -f pat_status.txt ]; then
            WARNING_SECTION=$(printf "⚠️ **GitHub access failed (401 Unauthorized)**\n\nThe Personal Access Token used by this workflow appears to be **expired or invalid**.\n\nPlease update the `CROSS_ORG_TOKEN` secret to restore automated publishing.\n\n")
          fi

          if [ -f published_repos.txt ]; then
            PUBLIC_LIST=$(sort -u published_repos.txt | awk '{print "- https://github.com/" $0}')
            if [ -n "$PUBLIC_LIST" ]; then
              PUBLIC_SECTION=$(printf "**✅ Newly published repositories:**\n\n%s\n\n" "$PUBLIC_LIST")
            fi
          fi

          if [ -f reverted_to_private.txt ]; then
            REVERTED_LIST=$(sort -u reverted_to_private.txt | awk '{print "- https://github.com/" $0}')
            if [ -n "$REVERTED_LIST" ]; then
              REVERTED_SECTION=$(printf "🔒 **Repositories reverted to private (early publication):**\n\n%s\n\n" "$REVERTED_LIST")
            fi
          fi

          if [ -f already_public_repos.txt ]; then
            ALREADY_PUBLIC_LIST=$(sort -u already_public_repos.txt | awk '{print "- https://github.com/" $0}')
            if [ -n "$ALREADY_PUBLIC_LIST" ]; then
              ALREADY_PUBLIC_SECTION=$(printf "**ℹ️ Repositories already public:**\n\n%s\n\n" "$ALREADY_PUBLIC_LIST")
            fi
          fi

          # Do not report if everything was already public and nothing else happened
          if [ -z "$WARNING_SECTION" ] && \
            [ -z "$PUBLIC_SECTION" ] && \
            [ -z "$REVERTED_SECTION" ]; then
            echo "Nothing to report"
            exit 0
          fi

          MESSAGE=$(printf "%s\n\n\n%s\n\n\n%s\n\n\n%s" \
            "$WARNING_SECTION" \
            "$PUBLIC_SECTION" \
            "$REVERTED_SECTION" \
            "$ALREADY_PUBLIC_SECTION")

          payload=$(jq -n \
            --arg date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg msg "$MESSAGE" \
            '{
              "@type": "MessageCard",
              "@context": "https://schema.org/extensions",
              "summary": "Advice repository publish summary",
              "themeColor": "2EB886",
              "title": "📢 Advice repository publish summary",
              "text": $msg,
              "sections": [
                {
                  "facts": [
                    { "name": "Checked at (UTC)", "value": $date }
                  ]
                }
              ]
            }')

          curl -X POST \
            -H "Content-Type: application/json" \
            -d "$payload" \
            "$WEBHOOK_URL"
